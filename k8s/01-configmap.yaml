apiVersion: v1
kind: ConfigMap
metadata:
  name: log-analytics-config
  namespace: log-analytics
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  KAFKA_TOPIC: "app-logs"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "loganalytics"
  POSTGRES_USER: "loguser"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: log-analytics-secrets
  namespace: log-analytics
type: Opaque
stringData:
  POSTGRES_PASSWORD: "logpass"