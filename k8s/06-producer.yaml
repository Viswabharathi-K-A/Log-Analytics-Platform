apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-producer
  namespace: log-analytics
  labels:
    app: log-producer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: log-producer
  template:
    metadata:
      labels:
        app: log-producer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: producer
          image: log-producer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: metrics
          envFrom:
            - configMapRef:
                name: log-analytics-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: producer-service
  namespace: log-analytics
spec:
  selector:
    app: log-producer
  ports:
    - port: 8000
      targetPort: 8000
      name: metrics
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: log-producer-hpa
  namespace: log-analytics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: log-producer
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70